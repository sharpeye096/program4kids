<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Sample数据分析可视化</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 800px;
            margin: 0 auto;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 1rem;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .chart-title {
            font-size: 1.4rem;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .insights {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-top: 40px;
        }

        .insights h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .insight-list {
            list-style-type: none;
        }

        .insight-list li {
            padding: 15px;
            margin-bottom: 10px;
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            border-radius: 6px;
        }

        .insight-list li strong {
            color: #667eea;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }

            .chart-grid .chart-container {
                min-width: 100%;
            }

            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Financial Sample数据分析可视化</h1>
            <p class="subtitle">基于2013年9月-2014年12月的销售数据，使用Chart.js进行可视化分析</p>
        </header>

        <div class="stats-summary" id="statsSummary">
            <!-- 统计数据将通过JavaScript动态填充 -->
        </div>

        <div class="chart-grid">
            <div class="chart-container">
                <h2 class="chart-title">各产品销售额与利润对比</h2>
                <div class="chart-wrapper">
                    <canvas id="productChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <h2 class="chart-title">各地区销售额与利润率</h2>
                <div class="chart-wrapper">
                    <canvas id="countryChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <h2 class="chart-title">各细分市场销售额分析</h2>
                <div class="chart-wrapper">
                    <canvas id="segmentChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <h2 class="chart-title">月度销售趋势</h2>
                <div class="chart-wrapper">
                    <canvas id="monthlyChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <h2 class="chart-title">折扣效果分析</h2>
                <div class="chart-wrapper">
                    <canvas id="discountChart"></canvas>
                </div>
            </div>

            <div class="chart-container">
                <h2 class="chart-title">价格与销售量关系</h2>
                <div class="chart-wrapper">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>
        </div>

        <div class="insights">
            <h2>核心业务洞察</h2>
            <ul class="insight-list" id="insightsList">
                <!-- 洞察将通过JavaScript动态填充 -->
            </ul>
        </div>

        <footer>
            <p>数据分析生成时间: <span id="currentDate"></span> | 数据来源: Financial Sample.xlsx | 可视化工具: Chart.js</p>
        </footer>
    </div>

    <script>
        // 设置当前日期
        document.getElementById('currentDate').textContent = new Date().toLocaleDateString('zh-CN');

        // 从JSON文件加载数据
        let chartData = {};

        async function loadData() {
            try {
                const response = await fetch('/learning-python/public/ai-efficiency/assets/chart_data.json');
                if (!response.ok) {
                    throw new Error('无法加载数据文件');
                }
                chartData = await response.json();
                initCharts();
                updateStats();
                updateInsights();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.body.innerHTML = `<div style="padding: 40px; text-align: center; color: #dc3545;">
                    <h2>加载数据失败</h2>
                    <p>${error.message}</p>
                    <p>请确保chart_data.json文件存在于同一目录中</p>
                </div>`;
            }
        }

        function formatCurrency(value) {
            if (value >= 1000000) {
                return '$' + (value / 1000000).toFixed(2) + 'M';
            } else if (value >= 1000) {
                return '$' + (value / 1000).toFixed(1) + 'K';
            }
            return '$' + value.toFixed(2);
        }

        function formatNumber(value) {
            if (value >= 1000000) {
                return (value / 1000000).toFixed(2) + 'M';
            } else if (value >= 1000) {
                return (value / 1000).toFixed(1) + 'K';
            }
            return value.toFixed(0);
        }

        function updateStats() {
            const stats = {
                totalSales: chartData.product_sales.sales.reduce((a, b) => a + b, 0),
                totalProfit: chartData.product_sales.profits.reduce((a, b) => a + b, 0),
                avgProfitMargin: (chartData.product_sales.profits.reduce((a, b) => a + b, 0) /
                    chartData.product_sales.sales.reduce((a, b) => a + b, 0) * 100).toFixed(2),
                topProduct: chartData.product_sales.labels[
                    chartData.product_sales.sales.indexOf(Math.max(...chartData.product_sales.sales))
                ],
                topCountry: chartData.country_sales.labels[
                    chartData.country_sales.sales.indexOf(Math.max(...chartData.country_sales.sales))
                ],
                dateRange: `${chartData.monthly_trend.labels[0]} - ${chartData.monthly_trend.labels[chartData.monthly_trend.labels.length - 1]}`
            };

            const statsHTML = `
                <div class="stat-card">
                    <div class="stat-label">总销售额</div>
                    <div class="stat-value">${formatCurrency(stats.totalSales)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">总利润</div>
                    <div class="stat-value">${formatCurrency(stats.totalProfit)}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">平均利润率</div>
                    <div class="stat-value">${stats.avgProfitMargin}%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最畅销产品</div>
                    <div class="stat-value">${stats.topProduct}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">最大市场</div>
                    <div class="stat-value">${stats.topCountry}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">分析期间</div>
                    <div class="stat-value">${stats.dateRange}</div>
                </div>
            `;

            document.getElementById('statsSummary').innerHTML = statsHTML;
        }

        function updateInsights() {
            // 基于数据分析生成洞察
            const productData = chartData.product_sales;
            const countryData = chartData.country_sales;
            const segmentData = chartData.segment_sales;
            const discountData = chartData.discount_analysis;

            // 找出最高和最低值
            const topProductIndex = productData.sales.indexOf(Math.max(...productData.sales));
            const topProduct = productData.labels[topProductIndex];
            const topProductSales = productData.sales[topProductIndex];

            const topCountryIndex = countryData.sales.indexOf(Math.max(...countryData.sales));
            const topCountry = countryData.labels[topCountryIndex];

            const topSegmentIndex = segmentData.sales.indexOf(Math.max(...segmentData.sales));
            const topSegment = segmentData.labels[topSegmentIndex];

            const highDiscountMargin = discountData.profit_margins[0]; // High discount
            const lowDiscountMargin = discountData.profit_margins[1]; // Low discount

            const insights = [
                `<strong>${topProduct}</strong> 是最畅销的产品，占总销售额的 ${(topProductSales / productData.sales.reduce((a, b) => a + b, 0) * 100).toFixed(1)}%`,
                `<strong>${topCountry}</strong> 是最大的市场，但利润率仅为 ${countryData.profit_margins[topCountryIndex].toFixed(1)}%，低于平均水平`,
                `<strong>${topSegment}</strong> 细分市场贡献了最高的销售额，但企业级市场(Enterprise)出现亏损，需要重点关注`,
                `折扣策略分析：<strong>高折扣(High)</strong>的利润率仅为${highDiscountMargin.toFixed(1)}%，而<strong>低折扣(Low)</strong>的利润率为${lowDiscountMargin.toFixed(1)}%，建议优化折扣策略`,
                `价格分析：高价位产品($350)虽然单价高，但销售量与低价产品相当，显示市场对高质量产品的接受度良好`,
                `季节性趋势：销售在10月和12月出现明显高峰，建议在这些月份增加库存和营销投入`,
                `产品利润率差异：Amarilla产品利润率最高(${Math.max(...productData.profit_margins).toFixed(1)}%)，Velo产品利润率最低(${Math.min(...productData.profit_margins).toFixed(1)}%)`
            ];

            const insightsHTML = insights.map(insight => `<li>${insight}</li>`).join('');
            document.getElementById('insightsList').innerHTML = insightsHTML;
        }

        function initCharts() {
            // 1. 产品销售额与利润对比图
            const productCtx = document.getElementById('productChart').getContext('2d');
            new Chart(productCtx, {
                type: 'bar',
                data: {
                    labels: chartData.product_sales.labels,
                    datasets: [
                        {
                            label: '销售额 ($)',
                            data: chartData.product_sales.sales,
                            backgroundColor: 'rgba(54, 162, 235, 0.7)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 1,
                            yAxisID: 'y'
                        },
                        {
                            label: '利润率 (%)',
                            data: chartData.product_sales.profit_margins,
                            backgroundColor: 'rgba(255, 99, 132, 0.7)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 1,
                            type: 'line',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: '销售额 ($)'
                            },
                            ticks: {
                                callback: function (value) {
                                    return formatCurrency(value);
                                }
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: '利润率 (%)'
                            },
                            grid: {
                                drawOnChartArea: false
                            },
                            ticks: {
                                callback: function (value) {
                                    return value + '%';
                                }
                            }
                        }
                    }
                }
            });

            // 2. 各地区销售额与利润率
            const countryCtx = document.getElementById('countryChart').getContext('2d');
            new Chart(countryCtx, {
                type: 'bar',
                data: {
                    labels: chartData.country_sales.labels,
                    datasets: [
                        {
                            label: '销售额 ($)',
                            data: chartData.country_sales.sales,
                            backgroundColor: 'rgba(75, 192, 192, 0.7)',
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 1
                        },
                        {
                            label: '利润率 (%)',
                            data: chartData.country_sales.profit_margins,
                            backgroundColor: 'rgba(153, 102, 255, 0.7)',
                            borderColor: 'rgba(153, 102, 255, 1)',
                            borderWidth: 1,
                            type: 'line',
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function (value) {
                                    return formatCurrency(value);
                                }
                            }
                        }
                    }
                }
            });

            // 3. 各细分市场销售额分析（分组柱状图）
            const segmentCtx = document.getElementById('segmentChart').getContext('2d');
            new Chart(segmentCtx, {
                type: 'bar',
                data: {
                    labels: chartData.segment_sales.labels,
                    datasets: [
                        {
                            label: '销售额 ($)',
                            data: chartData.segment_sales.sales,
                            backgroundColor: 'rgba(255, 159, 64, 0.7)',
                            borderColor: 'rgba(255, 159, 64, 1)',
                            borderWidth: 1
                        },
                        {
                            label: '利润 ($)',
                            data: chartData.segment_sales.profits,
                            backgroundColor: 'rgba(255, 99, 132, 0.7)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 1
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function (value) {
                                    return formatCurrency(value);
                                }
                            }
                        }
                    }
                }
            });

            // 4. 月度销售趋势图（折线图）
            const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
            new Chart(monthlyCtx, {
                type: 'line',
                data: {
                    labels: chartData.monthly_trend.labels,
                    datasets: [
                        {
                            label: '销售额 ($)',
                            data: chartData.monthly_trend.sales,
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        },
                        {
                            label: '利润 ($)',
                            data: chartData.monthly_trend.profits,
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                callback: function (value) {
                                    return formatCurrency(value);
                                }
                            }
                        }
                    }
                }
            });

            // 5. 折扣效果分析（雷达图）
            const discountCtx = document.getElementById('discountChart').getContext('2d');
            new Chart(discountCtx, {
                type: 'radar',
                data: {
                    labels: ['销售额', '利润率', '平均折扣率'],
                    datasets: [
                        {
                            label: '高折扣(High)',
                            data: [
                                chartData.discount_analysis.sales[0] / 1000000,
                                chartData.discount_analysis.profit_margins[0],
                                chartData.discount_analysis.avg_discount_rates[0]
                            ],
                            backgroundColor: 'rgba(255, 99, 132, 0.2)',
                            borderColor: 'rgba(255, 99, 132, 1)',
                            borderWidth: 2
                        },
                        {
                            label: '低折扣(Low)',
                            data: [
                                chartData.discount_analysis.sales[1] / 1000000,
                                chartData.discount_analysis.profit_margins[1],
                                chartData.discount_analysis.avg_discount_rates[1]
                            ],
                            backgroundColor: 'rgba(54, 162, 235, 0.2)',
                            borderColor: 'rgba(54, 162, 235, 1)',
                            borderWidth: 2
                        },
                        {
                            label: '中折扣(Medium)',
                            data: [
                                chartData.discount_analysis.sales[2] / 1000000,
                                chartData.discount_analysis.profit_margins[2],
                                chartData.discount_analysis.avg_discount_rates[2]
                            ],
                            backgroundColor: 'rgba(75, 192, 192, 0.2)',
                            borderColor: 'rgba(75, 192, 192, 1)',
                            borderWidth: 2
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            beginAtZero: true,
                            ticks: {
                                callback: function (value, index, ticks) {
                                    if (index === 0) return value.toFixed(1) + 'M';
                                    return value.toFixed(1) + '%';
                                }
                            }
                        }
                    }
                }
            });

            // 6. 价格与销售量关系（散点图）
            const priceCtx = document.getElementById('priceChart').getContext('2d');
            new Chart(priceCtx, {
                type: 'scatter',
                data: {
                    datasets: [{
                        label: '价格 vs 销售量',
                        data: chartData.price_analysis.labels.map((label, index) => ({
                            x: parseFloat(label.replace('$', '')),
                            y: chartData.price_analysis.units_sold[index],
                            r: chartData.price_analysis.sales[index] / 500000 // 气泡大小表示销售额
                        })),
                        backgroundColor: 'rgba(153, 102, 255, 0.7)',
                        borderColor: 'rgba(153, 102, 255, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: '销售价格 ($)'
                            },
                            type: 'linear',
                            position: 'bottom'
                        },
                        y: {
                            title: {
                                display: true,
                                text: '销售数量'
                            },
                            beginAtZero: true,
                            ticks: {
                                callback: function (value) {
                                    return formatNumber(value);
                                }
                            }
                        }
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    const price = context.parsed.x;
                                    const units = context.parsed.y;
                                    const salesIndex = chartData.price_analysis.labels.findIndex(l => parseFloat(l.replace('$', '')) === price);
                                    const sales = chartData.price_analysis.sales[salesIndex];
                                    return [
                                        `价格: $${price}`,
                                        `销售数量: ${formatNumber(units)}`,
                                        `销售额: ${formatCurrency(sales)}`
                                    ];
                                }
                            }
                        }
                    }
                }
            });
        }

        // 页面加载完成后加载数据
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</body>

</html>
