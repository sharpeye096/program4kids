<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WordBuddy - 单词学习小伙伴</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <a href="index.html" class="logo">
            <span class="logo-icon">📚</span>
            <span>WordBuddy</span>
        </a>
    </header>

    <main class="container">
        <div class="page-title">
            <h1>🌟 选择学习主题 🌟</h1>
            <p>点击卡片开始学习吧！</p>
        </div>

        <div class="theme-grid" id="themeGrid">
            <!-- 主题卡片将由JavaScript动态生成 -->
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        // 主题配置
        const themes = [
            { id: 'colors', name: '颜色世界', icon: '🌈', count: 15, available: true },
            { id: 'family', name: '家庭成员', icon: '👨‍👩‍👧‍👦', count: 0, available: false },
            { id: 'food', name: '水果蔬菜', icon: '🍎', count: 0, available: false },
            { id: 'animals', name: '动物王国', icon: '🐶', count: 0, available: false },
            { id: 'numbers', name: '数字时间', icon: '🔢', count: 0, available: false },
            { id: 'school', name: '学校生活', icon: '🏫', count: 0, available: false },
            { id: 'toys', name: '玩具运动', icon: '🎮', count: 0, available: false },
            { id: 'weather', name: '天气季节', icon: '🌦️', count: 0, available: false }
        ];

        // 渲染主题卡片
        const themeGrid = document.getElementById('themeGrid');
        themes.forEach(theme => {
            const card = document.createElement('a');
            card.className = `theme-card${theme.available ? '' : ' disabled'}`;
            card.href = theme.available ? `practice.html?theme=${theme.id}` : '#';

            card.innerHTML = `
        <span class="theme-icon">${theme.icon}</span>
        <div class="theme-name">${theme.name}</div>
        <div class="theme-count">${theme.available ? `${theme.count} 个单词` : '即将开放'}</div>
      `;

            if (!theme.available) {
                card.onclick = (e) => e.preventDefault();
            }

            themeGrid.appendChild(card);
        });
    </script>
</body>

</html>
